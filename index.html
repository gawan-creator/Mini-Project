<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="dashboard">

    <!-- Row 1: Clock — full width -->
    <section class="card card--clock" id="clock-section">
      <p class="clock__time"     id="clock-time"></p>
      <p class="clock__date"     id="clock-date"></p>
      <p class="clock__greeting" id="clock-greeting"></p>
      <!-- Challenge: Custom name in greeting -->
      <div class="clock__name-row">
        <input type="text" id="name-input" placeholder="Enter your name..." aria-label="Your name" maxlength="30" />
        <button id="name-save-btn" type="button">Save</button>
      </div>
    </section>

    <!-- Row 2 left: Focus Timer -->
    <section class="card card--timer" id="timer-section">
      <h2 class="card__title">Focus Timer</h2>
      <p class="timer__display" id="timer-display" aria-live="polite">25:00</p>
      <div class="timer__controls">
        <button id="timer-start-btn" type="button">Start</button>
        <button id="timer-stop-btn"  type="button">Stop</button>
        <button id="timer-reset-btn" type="button">Reset</button>
      </div>
      <!-- Challenge: Change Pomodoro time -->
      <div class="timer__custom-row">
        <label for="timer-custom-input" class="timer__custom-label">Set duration (min):</label>
        <input type="number" id="timer-custom-input" min="1" max="120" value="25" aria-label="Custom timer duration in minutes" />
        <button id="timer-set-btn" type="button">Set</button>
      </div>
    </section>

    <!-- Row 2 right: Tasks -->
    <section class="card card--todo" id="todo-section">
      <h2 class="card__title">Tasks</h2>
      <div class="todo__input-row">
        <input type="text" id="todo-input" placeholder="Add a new task..." aria-label="Add a new task" />
        <button id="todo-add-btn" type="button">Add</button>
      </div>
      <p class="todo__error" id="todo-error" hidden aria-live="polite"></p>
      <ul class="todo__list" id="todo-list" aria-label="Task list"></ul>
    </section>

    <!-- Row 3 left: Quick Links -->
    <section class="card card--links" id="links-section">
      <h2 class="card__title">Quick Links</h2>
      <div class="links__input-row">
        <input type="text" id="links-name-input" placeholder="Link name"  aria-label="Link name" />
        <input type="url"  id="links-url-input"  placeholder="URL"        aria-label="URL" />
        <button id="links-add-btn" type="button">Add Link</button>
      </div>
      <p class="links__error" id="links-error" hidden aria-live="polite"></p>
      <ul class="links__list" id="links-list" aria-label="Quick links"></ul>
    </section>

  </main>
  <script src="js/app.js"></script>
</body>
</html>
