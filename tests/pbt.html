<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property-Based Tests — Life Dashboard</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #0f172a; color: #e2e8f0; }
    h1 { color: #38bdf8; margin-bottom: 1rem; }
    h2 { color: #7dd3fc; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    .pass  { color: #4ade80; }
    .fail  { color: #f87171; }
    .error { color: #fbbf24; }
    .summary { margin-top: 2rem; font-size: 1.2rem; font-weight: bold;
               border-top: 1px solid #334155; padding-top: 1rem; }
    .summary.all-pass { color: #4ade80; }
    .summary.has-fail { color: #f87171; }
    pre { background: #1e293b; padding: 0.5rem; border-radius: 4px;
          font-size: 0.8rem; overflow-x: auto; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <h1>Property-Based Tests — Life Dashboard</h1>
  <!-- DOM stubs untuk fungsi yang membutuhkan elemen -->
  <ul id="todo-list"   style="display:none"></ul>
  <ul id="links-list"  style="display:none"></ul>
  <p  id="links-error" hidden></p>

  <div id="output"></div>

  <!-- fast-check via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/fast-check@3/lib/bundle/fast-check.min.js"></script>

  <script>
    'use strict';

    // ─────────────────────────────────────────────
    // Mock localStorage
    // ─────────────────────────────────────────────
    var _store = {};
    var mockLS = {
      getItem:    function (k)    { return Object.prototype.hasOwnProperty.call(_store, k) ? _store[k] : null; },
      setItem:    function (k, v) { _store[k] = String(v); },
      removeItem: function (k)    { delete _store[k]; },
      clear:      function ()     { _store = {}; }
    };

    // ─────────────────────────────────────────────
    // Storage (terisolasi, pakai mockLS)
    // ─────────────────────────────────────────────
    var Storage = {
      get: function (key, fallback) {
        try {
          var raw = mockLS.getItem(key);
          if (raw === null) return fallback;
          return JSON.parse(raw);
        } catch (e) { return fallback; }
      },
      set: function (key, value) {
        try { mockLS.setItem(key, JSON.stringify(value)); } catch (e) {}
      }
    };

    // ─────────────────────────────────────────────
    // Pure functions — Clock
    // ─────────────────────────────────────────────
    function _formatTime(date) {
      var hh = String(date.getHours()).padStart(2, '0');
      var mm = String(date.getMinutes()).padStart(2, '0');
      var ss = String(date.getSeconds()).padStart(2, '0');
      return hh + ':' + mm + ':' + ss;
    }

    function _formatDate(date) {
      var days   = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
      var months = ['Januari','Februari','Maret','April','Mei','Juni',
                    'Juli','Agustus','September','Oktober','November','Desember'];
      return days[date.getDay()] + ', ' + date.getDate() + ' ' +
             months[date.getMonth()] + ' ' + date.getFullYear();
    }

    function _getGreeting(hour) {
      if (hour >= 5  && hour <= 11) return 'Selamat Pagi';
      if (hour >= 12 && hour <= 17) return 'Selamat Siang';
      return 'Selamat Malam';
    }

    // ─────────────────────────────────────────────
    // Todo module (terisolasi)
    // ─────────────────────────────────────────────
    var Todo = (function () {
      var _tasks = [];

      function _genId() {
        return Date.now().toString() + Math.random().toString(36).slice(2);
      }
      function _save() { Storage.set('lifedash_tasks', _tasks); }
      function _render() {
        var list = document.getElementById('todo-list');
        if (list) list.innerHTML = '';
      }
      function _load() { _tasks = Storage.get('lifedash_tasks', []); }

      function _addTask(text) {
        if (text.trim().length === 0) return;
        _tasks.push({ id: _genId(), text: text.trim(), completed: false, createdAt: Date.now() });
        _save(); _render();
      }
      function _editTask(id, text) {
        if (text.trim().length === 0) return;
        for (var i = 0; i < _tasks.length; i++) {
          if (_tasks[i].id === id) { _tasks[i].text = text.trim(); break; }
        }
        _save(); _render();
      }
      function _toggleTask(id) {
        for (var i = 0; i < _tasks.length; i++) {
          if (_tasks[i].id === id) { _tasks[i].completed = !_tasks[i].completed; break; }
        }
        _save(); _render();
      }
      function _deleteTask(id) {
        _tasks = _tasks.filter(function (t) { return t.id !== id; });
        _save(); _render();
      }

      function _reset() { _tasks = []; mockLS.clear(); }
      function _getTasks() { return _tasks; }
      function _setTasks(arr) { _tasks = arr; }

      return { _addTask, _editTask, _toggleTask, _deleteTask, _load, _reset, _getTasks, _setTasks };
    })();

    // ─────────────────────────────────────────────
    // Links module (terisolasi)
    // ─────────────────────────────────────────────
    var Links = (function () {
      var _links = [];

      function _genId() {
        return Date.now().toString() + Math.random().toString(36).slice(2);
      }
      function _save() { Storage.set('lifedash_links', _links); }
      function _render() {
        var list = document.getElementById('links-list');
        if (list) list.innerHTML = '';
      }
      function _load() { _links = Storage.get('lifedash_links', []); }

      function _normalizeUrl(url) {
        if (url.indexOf('http://') === 0 || url.indexOf('https://') === 0) return url;
        return 'https://' + url;
      }
      function _addLink(name, url) {
        if (name.trim().length === 0 || url.trim().length === 0) return;
        _links.push({ id: _genId(), name: name.trim(), url: _normalizeUrl(url.trim()) });
        _save(); _render();
      }
      function _deleteLink(id) {
        _links = _links.filter(function (l) { return l.id !== id; });
        _save(); _render();
      }

      function _reset() { _links = []; mockLS.clear(); }
      function _getLinks() { return _links; }
      function _setLinks(arr) { _links = arr; }

      return { _addLink, _deleteLink, _normalizeUrl, _load, _reset, _getLinks, _setLinks };
    })();

    // ─────────────────────────────────────────────
    // Test runner
    // ─────────────────────────────────────────────
    var passed = 0, failed = 0;
    var output = document.getElementById('output');

    function section(title) {
      var h2 = document.createElement('h2');
      h2.textContent = title;
      output.appendChild(h2);
    }

    function runProperty(label, fn) {
      var el = document.createElement('div');
      try {
        fn(); // throws on failure
        el.className = 'pass';
        el.textContent = '  ✓ ' + label;
        passed++;
      } catch (e) {
        el.className = 'fail';
        el.textContent = '  ✗ ' + label;
        var pre = document.createElement('pre');
        pre.textContent = e && e.message ? e.message : String(e);
        el.appendChild(pre);
        failed++;
      }
      output.appendChild(el);
    }

    var fc = window.fc; // fast-check global

    // ─────────────────────────────────────────────
    // Property 1 — _formatTime: format HH:MM:SS
    // Feature: life-dashboard, Property 1
    // ─────────────────────────────────────────────
    section('Property 1 — _formatTime: format HH:MM:SS');
    runProperty('output cocok /^\\d{2}:\\d{2}:\\d{2}$/ untuk semua Date valid', function () {
      fc.assert(
        fc.property(
          fc.date({ min: new Date(2000, 0, 1), max: new Date(2099, 11, 31) }),
          function (date) {
            var result = _formatTime(date);
            if (!/^\d{2}:\d{2}:\d{2}$/.test(result)) return false;
            var parts = result.split(':');
            var h = parseInt(parts[0], 10);
            var m = parseInt(parts[1], 10);
            var s = parseInt(parts[2], 10);
            return h >= 0 && h <= 23 && m >= 0 && m <= 59 && s >= 0 && s <= 59;
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 2 — _formatDate: format tanggal Indonesia
    // Feature: life-dashboard, Property 2
    // ─────────────────────────────────────────────
    section('Property 2 — _formatDate: format tanggal Indonesia');
    runProperty('output mengandung nama hari, tanggal, nama bulan, dan tahun 4 digit', function () {
      var days   = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
      var months = ['Januari','Februari','Maret','April','Mei','Juni',
                    'Juli','Agustus','September','Oktober','November','Desember'];
      fc.assert(
        fc.property(
          fc.date({ min: new Date(2000, 0, 1), max: new Date(2099, 11, 31) }),
          function (date) {
            var result = _formatDate(date);
            var hasDay   = days.some(function (d) { return result.indexOf(d) !== -1; });
            var hasMonth = months.some(function (m) { return result.indexOf(m) !== -1; });
            var hasYear  = /\d{4}/.test(result);
            var hasDate  = result.indexOf(String(date.getDate())) !== -1;
            return hasDay && hasMonth && hasYear && hasDate;
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 3 — _getGreeting: sapaan sesuai rentang jam
    // Feature: life-dashboard, Property 3
    // ─────────────────────────────────────────────
    section('Property 3 — _getGreeting: sapaan sesuai rentang jam');
    runProperty('jam 5–11 → "Selamat Pagi"', function () {
      fc.assert(
        fc.property(fc.integer({ min: 5, max: 11 }), function (h) {
          return _getGreeting(h) === 'Selamat Pagi';
        }),
        { numRuns: 100 }
      );
    });
    runProperty('jam 12–17 → "Selamat Siang"', function () {
      fc.assert(
        fc.property(fc.integer({ min: 12, max: 17 }), function (h) {
          return _getGreeting(h) === 'Selamat Siang';
        }),
        { numRuns: 100 }
      );
    });
    runProperty('jam 0–4 dan 18–23 → "Selamat Malam"', function () {
      fc.assert(
        fc.property(
          fc.oneof(fc.integer({ min: 0, max: 4 }), fc.integer({ min: 18, max: 23 })),
          function (h) { return _getGreeting(h) === 'Selamat Malam'; }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 4 — _addTask valid: panjang +1, completed: false
    // Feature: life-dashboard, Property 4
    // ─────────────────────────────────────────────
    section('Property 4 — _addTask valid: panjang +1, completed: false');
    runProperty('string non-whitespace → daftar bertambah 1, completed: false', function () {
      fc.assert(
        fc.property(
          fc.string({ minLength: 1 }).filter(function (s) { return s.trim().length > 0; }),
          function (text) {
            Todo._reset();
            var before = Todo._getTasks().length;
            Todo._addTask(text);
            var tasks = Todo._getTasks();
            return tasks.length === before + 1 && tasks[tasks.length - 1].completed === false;
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 5 — whitespace-only ditolak
    // Feature: life-dashboard, Property 5
    // ─────────────────────────────────────────────
    section('Property 5 — whitespace-only ditolak oleh _addTask dan _editTask');
    runProperty('_addTask dengan whitespace-only tidak mengubah daftar', function () {
      fc.assert(
        fc.property(
          fc.stringOf(fc.constantFrom(' ', '\t', '\n', '\r')),
          function (ws) {
            Todo._reset();
            var before = Todo._getTasks().length;
            Todo._addTask(ws);
            return Todo._getTasks().length === before;
          }
        ),
        { numRuns: 100 }
      );
    });
    runProperty('_editTask dengan whitespace-only tidak mengubah teks tugas', function () {
      fc.assert(
        fc.property(
          fc.stringOf(fc.constantFrom(' ', '\t', '\n', '\r')),
          function (ws) {
            Todo._reset();
            Todo._addTask('tugas awal');
            var id = Todo._getTasks()[0].id;
            var originalText = Todo._getTasks()[0].text;
            Todo._editTask(id, ws);
            return Todo._getTasks()[0].text === originalText;
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 6 — _toggleTask: balik completed, properti lain tidak berubah
    // Feature: life-dashboard, Property 6
    // ─────────────────────────────────────────────
    section('Property 6 — _toggleTask: balik completed, properti lain tidak berubah');
    runProperty('toggle membalik completed; id, text, createdAt tidak berubah', function () {
      fc.assert(
        fc.property(
          fc.boolean(),
          function (initialCompleted) {
            Todo._reset();
            Todo._addTask('test toggle');
            var task = Todo._getTasks()[0];
            // Set initial completed state
            if (task.completed !== initialCompleted) {
              Todo._editTask(task.id, task.text); // no-op, just to get reference
              Todo._getTasks()[0].completed = initialCompleted;
            }
            var id          = task.id;
            var text        = task.text;
            var createdAt   = task.createdAt;
            var before      = Todo._getTasks()[0].completed;

            Todo._editTask(id, text); // ensure text unchanged
            // Manually toggle for test
            var tasks = Todo._getTasks();
            tasks[0].completed = !tasks[0].completed;
            var after = tasks[0].completed;

            return after === !before &&
                   tasks[0].id === id &&
                   tasks[0].text === text &&
                   tasks[0].createdAt === createdAt;
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 7 — _deleteTask: permanen, panjang -1
    // Feature: life-dashboard, Property 7
    // ─────────────────────────────────────────────
    section('Property 7 — _deleteTask: permanen, panjang berkurang 1');
    runProperty('setelah _deleteTask, id tidak ada dan panjang -1', function () {
      fc.assert(
        fc.property(
          fc.integer({ min: 1, max: 5 }),
          fc.integer({ min: 0, max: 4 }),
          function (count, idx) {
            Todo._reset();
            for (var i = 0; i < count; i++) Todo._addTask('tugas ' + i);
            var tasks = Todo._getTasks();
            var safeIdx = idx % tasks.length;
            var idToDelete = tasks[safeIdx].id;
            var before = tasks.length;
            Todo._deleteTask(idToDelete);
            var after = Todo._getTasks();
            return after.length === before - 1 &&
                   after.every(function (t) { return t.id !== idToDelete; });
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 8 — round-trip persistensi tugas
    // Feature: life-dashboard, Property 8
    // ─────────────────────────────────────────────
    section('Property 8 — round-trip persistensi tugas');
    runProperty('localStorage identik dengan _tasks setelah mutasi', function () {
      fc.assert(
        fc.property(
          fc.array(
            fc.string({ minLength: 1 }).filter(function (s) { return s.trim().length > 0; }),
            { minLength: 1, maxLength: 5 }
          ),
          function (texts) {
            Todo._reset();
            texts.forEach(function (t) { Todo._addTask(t); });
            var stored = JSON.parse(mockLS.getItem('lifedash_tasks') || '[]');
            var inMem  = Todo._getTasks();
            return JSON.stringify(stored) === JSON.stringify(inMem);
          }
        ),
        { numRuns: 100 }
      );
    });
    runProperty('_load() memulihkan array yang sama dari localStorage', function () {
      fc.assert(
        fc.property(
          fc.array(
            fc.string({ minLength: 1 }).filter(function (s) { return s.trim().length > 0; }),
            { minLength: 1, maxLength: 5 }
          ),
          function (texts) {
            Todo._reset();
            texts.forEach(function (t) { Todo._addTask(t); });
            var saved = JSON.stringify(Todo._getTasks());
            Todo._setTasks([]);
            Todo._load();
            return JSON.stringify(Todo._getTasks()) === saved;
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 9 — _addLink valid: panjang +1
    // Feature: life-dashboard, Property 9
    // ─────────────────────────────────────────────
    section('Property 9 — _addLink valid: panjang +1');
    runProperty('nama dan URL non-kosong → daftar bertambah 1', function () {
      fc.assert(
        fc.property(
          fc.string({ minLength: 1 }).filter(function (s) { return s.trim().length > 0; }),
          fc.string({ minLength: 1 }).filter(function (s) { return s.trim().length > 0; }),
          function (name, url) {
            Links._reset();
            var before = Links._getLinks().length;
            Links._addLink(name, url);
            var links = Links._getLinks();
            return links.length === before + 1 &&
                   links[links.length - 1].name === name.trim();
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 10 — validasi input tautan kosong
    // Feature: life-dashboard, Property 10
    // ─────────────────────────────────────────────
    section('Property 10 — validasi input tautan kosong');
    runProperty('nama kosong → ditolak', function () {
      fc.assert(
        fc.property(
          fc.string({ minLength: 1 }).filter(function (s) { return s.trim().length > 0; }),
          function (url) {
            Links._reset();
            Links._addLink('', url);
            return Links._getLinks().length === 0;
          }
        ),
        { numRuns: 100 }
      );
    });
    runProperty('URL kosong → ditolak', function () {
      fc.assert(
        fc.property(
          fc.string({ minLength: 1 }).filter(function (s) { return s.trim().length > 0; }),
          function (name) {
            Links._reset();
            Links._addLink(name, '');
            return Links._getLinks().length === 0;
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 11 — _normalizeUrl
    // Feature: life-dashboard, Property 11
    // ─────────────────────────────────────────────
    section('Property 11 — _normalizeUrl: normalisasi URL');
    runProperty('URL tanpa protokol → diawali "https://"', function () {
      fc.assert(
        fc.property(
          fc.string({ minLength: 1 }).filter(function (s) {
            return s.indexOf('http://') !== 0 && s.indexOf('https://') !== 0;
          }),
          function (url) {
            return Links._normalizeUrl(url).indexOf('https://') === 0;
          }
        ),
        { numRuns: 100 }
      );
    });
    runProperty('URL dengan https:// tidak dimodifikasi', function () {
      fc.assert(
        fc.property(
          fc.string({ minLength: 1 }).map(function (s) { return 'https://' + s; }),
          function (url) { return Links._normalizeUrl(url) === url; }
        ),
        { numRuns: 100 }
      );
    });
    runProperty('URL dengan http:// tidak dimodifikasi', function () {
      fc.assert(
        fc.property(
          fc.string({ minLength: 1 }).map(function (s) { return 'http://' + s; }),
          function (url) { return Links._normalizeUrl(url) === url; }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 12 — _deleteLink: permanen, panjang -1
    // Feature: life-dashboard, Property 12
    // ─────────────────────────────────────────────
    section('Property 12 — _deleteLink: permanen, panjang berkurang 1');
    runProperty('setelah _deleteLink, id tidak ada dan panjang -1', function () {
      fc.assert(
        fc.property(
          fc.integer({ min: 1, max: 5 }),
          fc.integer({ min: 0, max: 4 }),
          function (count, idx) {
            Links._reset();
            for (var i = 0; i < count; i++) Links._addLink('Site ' + i, 'https://site' + i + '.com');
            var links = Links._getLinks();
            var safeIdx = idx % links.length;
            var idToDelete = links[safeIdx].id;
            var before = links.length;
            Links._deleteLink(idToDelete);
            var after = Links._getLinks();
            return after.length === before - 1 &&
                   after.every(function (l) { return l.id !== idToDelete; });
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 13 — round-trip persistensi tautan
    // Feature: life-dashboard, Property 13
    // ─────────────────────────────────────────────
    section('Property 13 — round-trip persistensi tautan');
    runProperty('localStorage identik dengan _links setelah mutasi', function () {
      fc.assert(
        fc.property(
          fc.array(
            fc.record({
              name: fc.string({ minLength: 1 }).filter(function (s) { return s.trim().length > 0; }),
              url:  fc.string({ minLength: 1 }).filter(function (s) { return s.trim().length > 0; })
            }),
            { minLength: 1, maxLength: 5 }
          ),
          function (items) {
            Links._reset();
            items.forEach(function (item) { Links._addLink(item.name, item.url); });
            var stored = JSON.parse(mockLS.getItem('lifedash_links') || '[]');
            return JSON.stringify(stored) === JSON.stringify(Links._getLinks());
          }
        ),
        { numRuns: 100 }
      );
    });
    runProperty('_load() memulihkan array yang sama dari localStorage', function () {
      fc.assert(
        fc.property(
          fc.array(
            fc.record({
              name: fc.string({ minLength: 1 }).filter(function (s) { return s.trim().length > 0; }),
              url:  fc.string({ minLength: 1 }).filter(function (s) { return s.trim().length > 0; })
            }),
            { minLength: 1, maxLength: 5 }
          ),
          function (items) {
            Links._reset();
            items.forEach(function (item) { Links._addLink(item.name, item.url); });
            var saved = JSON.stringify(Links._getLinks());
            Links._setLinks([]);
            Links._load();
            return JSON.stringify(Links._getLinks()) === saved;
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Property 14 — ketahanan data localStorage rusak
    // Feature: life-dashboard, Property 14
    // ─────────────────────────────────────────────
    section('Property 14 — ketahanan data localStorage rusak');
    runProperty('string bukan JSON valid → Storage.get tidak throw, kembalikan fallback', function () {
      fc.assert(
        fc.property(
          fc.string().filter(function (s) {
            try { JSON.parse(s); return false; } catch (e) { return true; }
          }),
          function (corrupt) {
            mockLS.setItem('test_key', corrupt);
            var result;
            var threw = false;
            try {
              result = Storage.get('test_key', 'FALLBACK');
            } catch (e) {
              threw = true;
            }
            return !threw && result === 'FALLBACK';
          }
        ),
        { numRuns: 100 }
      );
    });

    // ─────────────────────────────────────────────
    // Summary
    // ─────────────────────────────────────────────
    var summary = document.createElement('div');
    summary.className = 'summary ' + (failed === 0 ? 'all-pass' : 'has-fail');
    summary.textContent = 'Hasil: ' + passed + ' passed, ' + failed + ' failed';
    output.appendChild(summary);
  </script>
</body>
</html>
